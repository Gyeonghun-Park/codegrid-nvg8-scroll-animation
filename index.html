<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nvg8 Scroll Animation | Codegrid</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <section class="intro">
      <!-- Text overlays -->
      <h1 class="intro-header-in">Scroll down to watch calm quietly unravel</h1>
      <h1 class="intro-header-out">Welcome back, things have shifted again</h1>

      <!-- Animation container: 3 rows, each with enter + wipe + sweep layers -->
      <div class="block-container">
        <div class="block-row row-top">
          <div class="block-layer layer-enter"></div>
          <div class="block-layer layer-wipe"></div>
          <div class="block-layer layer-sweep"></div>

        </div>
        <div class="block-row row-mid">
          <div class="block-layer layer-enter"></div>
          <div class="block-layer layer-wipe"></div>
          <div class="block-layer layer-sweep"></div>

        </div>
        <div class="block-row row-bot">
          <div class="block-layer layer-enter"></div>
          <div class="block-layer layer-wipe"></div>
          <div class="block-layer layer-sweep"></div>

        </div>
      </div>

      <!-- Curve overlay: thick curved strokes that sweep across rows 2+3 -->
      <div class="curve-overlay">
        <svg viewBox="0 0 1400 1050" fill="none" preserveAspectRatio="none">
          <!-- Curve 1: yellow/gold — upper arc -->
          <path
            id="curve-1-border"
            d="M -300,525 C 400,525 900,700 1500,2150"
            stroke="#0f0f0f"
            stroke-width="360"
            stroke-linecap="butt"
          />
          <path
            id="curve-1"
            d="M -300,525 C 400,525 900,700 1500,2150"
            stroke="#FFC412"
            stroke-width="350"
            stroke-linecap="butt"
          />
          <!-- Curve 2: orange — follows same path as curve 1 -->
          <path
            id="curve-2-border"
            d="M -300,525 C 400,525 900,700 1500,2150"
            stroke="#0f0f0f"
            stroke-width="360"
            stroke-linecap="butt"
          />
          <path
            id="curve-2"
            d="M -300,525 C 400,525 900,700 1500,2150"
            stroke="#FF6D38"
            stroke-width="350"
            stroke-linecap="butt"
          />
        </svg>
      </div>
    </section>

    <section class="outro">
      <h1>This is the outro, pretend it's profound</h1>
    </section>

    <script type="module" src="/script.js"></script>
  </body>
</html>
