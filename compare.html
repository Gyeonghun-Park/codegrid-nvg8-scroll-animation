<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rive vs SVG Comparison</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #fff; }

      /* ── Controls ── */
      .controls {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 1000;
        background: rgba(0,0,0,0.9);
        backdrop-filter: blur(10px);
        padding: 16px 24px;
        display: flex;
        align-items: center;
        gap: 20px;
        border-bottom: 1px solid #333;
      }
      .controls label { font-size: 13px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
      .controls input[type="range"] { flex: 1; max-width: 600px; accent-color: #FF6D38; }
      .progress-value {
        font-size: 20px; font-weight: 700; color: #FF6D38;
        min-width: 60px; text-align: right; font-variant-numeric: tabular-nums;
      }
      .mode-toggle { margin-left: auto; display: flex; gap: 8px; }
      .mode-toggle button {
        padding: 6px 14px; border: 1px solid #444; background: transparent;
        color: #999; border-radius: 4px; cursor: pointer; font-size: 12px; text-transform: uppercase;
      }
      .mode-toggle button.active { background: #FF6D38; border-color: #FF6D38; color: #000; font-weight: 700; }

      /* ── Comparison Layout ── */
      .comparison { margin-top: 60px; display: flex; height: calc(100svh - 60px); }
      .comparison.stacked { flex-direction: column; }
      .panel { flex: 1; position: relative; overflow: hidden; }
      .panel + .panel { border-left: 2px solid #FF6D38; }
      .comparison.stacked .panel + .panel { border-left: none; border-top: 2px solid #FF6D38; }
      .panel-label {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 4px;
        font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
      }
      .panel-label.rive { color: #C6FE69; }
      .panel-label.svg { color: #B9DDFD; }

      /* Overlay mode */
      .comparison.overlay { position: relative; }
      .comparison.overlay .panel { position: absolute; inset: 0; border: none !important; }
      .comparison.overlay #svg-panel { opacity: 0.5; mix-blend-mode: difference; }
      .comparison.overlay .panel-label.svg { left: auto; right: 12px; }

      /* ── Rive Panel ── */
      #rive-panel { background: #e3e3db; }
      #rive-canvas { width: 100%; height: 100%; }

      /* ── SVG Panel ── */
      #svg-panel { background: #e3e3db; }

      #svg-panel .svg-container,
      #svg-panel .svg-container-2 {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 300%;
        height: calc(100% - 4px);
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
      }
      #svg-panel .svg-row {
        position: relative; flex: 1;
        width: 100%; height: 100%;
      }
      #svg-panel .svg-row svg {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 100%; height: 100%; overflow: visible;
      }
      #svg-panel .svg-container-2 svg {
        position: absolute; top: 0%; left: 40%;
        height: 310%; object-fit: contain;
        transform: translate(-50%, -1%);
      }
      #svg-panel .svg-row svg path { will-change: stroke-dashoffset; }
    </style>
  </head>
  <body>
    <div class="controls">
      <label>Progress</label>
      <input type="range" id="scrubber" min="0" max="100" value="0" step="0.1" />
      <div class="progress-value" id="progress-display">0%</div>
      <div class="mode-toggle">
        <button class="active" data-mode="side">Side by Side</button>
        <button data-mode="stacked">Stacked</button>
        <button data-mode="overlay">Overlay</button>
      </div>
    </div>

    <div class="comparison" id="comparison">
      <!-- Rive Panel -->
      <div class="panel" id="rive-panel">
        <div class="panel-label rive">Rive (Original)</div>
        <canvas id="rive-canvas"></canvas>
      </div>

      <!-- SVG Panel -->
      <div class="panel" id="svg-panel">
        <div class="panel-label svg">SVG (Rebuilt)</div>

        <div class="svg-container">
          <div class="svg-row">
            <svg width="3360" height="360" viewBox="0 0 3360 360" fill="none" xmlns="http://www.w3.org/2000/svg" id="svg-top-1">
              <path d="M180 180H3180" stroke="#FF6D38" stroke-width="360" stroke-miterlimit="3.8637" stroke-linecap="round" />
            </svg>
            <svg width="3360" height="360" viewBox="0 0 3360 360" fill="none" xmlns="http://www.w3.org/2000/svg" id="svg-top-2">
              <path d="M180 180H3180" stroke="#C6FE69" stroke-width="360" stroke-miterlimit="3.8637" stroke-linecap="round" />
            </svg>
            <svg width="3360" height="360" viewBox="0 0 3360 360" fill="none" xmlns="http://www.w3.org/2000/svg" id="svg-top-3">
              <path d="M180 180H3180" stroke="#7A78FF" stroke-width="360" stroke-miterlimit="3.8637" stroke-linecap="round" />
            </svg>
          </div>
          <div class="svg-row">
            <svg width="3360" height="360" viewBox="0 0 3360 360" fill="none" xmlns="http://www.w3.org/2000/svg" id="svg-middle-1">
              <path d="M180 180H3180" stroke="#7A78FF" stroke-width="360" stroke-miterlimit="3.8637" stroke-linecap="round" />
            </svg>
            <svg width="3360" height="360" viewBox="0 0 3360 360" fill="none" xmlns="http://www.w3.org/2000/svg" id="svg-middle-2">
              <path d="M180 180H3180" stroke="#B9DDFD" stroke-width="360" stroke-miterlimit="3.8637" stroke-linecap="round" />
            </svg>
            <svg width="3360" height="360" viewBox="0 0 3360 360" fill="none" xmlns="http://www.w3.org/2000/svg" id="svg-middle-3">
              <path d="M180 180H3180" stroke="#C6FE69" stroke-width="360" stroke-miterlimit="3.8637" stroke-linecap="round" />
            </svg>
          </div>
          <div class="svg-row">
            <svg width="3360" height="360" viewBox="0 0 3360 360" fill="none" xmlns="http://www.w3.org/2000/svg" id="svg-bottom-1">
              <path d="M180 180H3180" stroke="#FFC412" stroke-width="360" stroke-miterlimit="3.8637" stroke-linecap="round" />
            </svg>
            <svg width="3360" height="360" viewBox="0 0 3360 360" fill="none" xmlns="http://www.w3.org/2000/svg" id="svg-bottom-2">
              <path d="M180 180H3180" stroke="#FF6D38" stroke-width="360" stroke-miterlimit="3.8637" stroke-linecap="round" />
            </svg>
            <svg width="3360" height="360" viewBox="0 0 3360 360" fill="none" xmlns="http://www.w3.org/2000/svg" id="svg-bottom-3">
              <path d="M180 180H3180" stroke="#B9DDFD" stroke-width="360" stroke-miterlimit="3.8637" stroke-linecap="round" />
            </svg>
          </div>
        </div>

        <div class="svg-container-2">
          <div class="svg-row"></div>
          <div class="svg-row">
            <svg width="2248" height="1112" viewBox="0 0 2248 1112" fill="none" xmlns="http://www.w3.org/2000/svg" id="svg-curve-1">
              <path d="M180 180.538C1512.01 180.54 1718.64 133.099 2067.5 931.594" stroke="#ffc412" stroke-width="360" stroke-miterlimit="3.8637" stroke-linecap="round" />
            </svg>
            <svg width="2248" height="1112" viewBox="0 0 2248 1112" fill="none" xmlns="http://www.w3.org/2000/svg" id="svg-curve-2">
              <path d="M180 180.538C1512.01 180.54 1718.64 133.099 2067.5 931.594" stroke="#FF6D38" stroke-width="360" stroke-miterlimit="3.8637" stroke-linecap="round" />
            </svg>
          </div>
          <div class="svg-row"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/compare.js"></script>
  </body>
</html>
