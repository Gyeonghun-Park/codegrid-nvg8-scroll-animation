<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rive vs SVG Comparison</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #fff; }

      /* ── Controls ── */
      .controls {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 1000;
        background: rgba(0,0,0,0.9);
        backdrop-filter: blur(10px);
        padding: 16px 24px;
        display: flex;
        align-items: center;
        gap: 20px;
        border-bottom: 1px solid #333;
      }
      .controls label { font-size: 13px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
      .controls input[type="range"] { flex: 1; max-width: 600px; accent-color: #FF6D38; }
      .progress-value {
        font-size: 20px; font-weight: 700; color: #FF6D38;
        min-width: 60px; text-align: right; font-variant-numeric: tabular-nums;
      }
      .mode-toggle { margin-left: auto; display: flex; gap: 8px; }
      .mode-toggle button {
        padding: 6px 14px; border: 1px solid #444; background: transparent;
        color: #999; border-radius: 4px; cursor: pointer; font-size: 12px; text-transform: uppercase;
      }
      .mode-toggle button.active { background: #FF6D38; border-color: #FF6D38; color: #000; font-weight: 700; }

      /* ── Comparison Layout ── */
      .comparison { margin-top: 60px; display: flex; height: calc(100svh - 60px); }
      .comparison.stacked { flex-direction: column; }
      .panel { flex: 1; position: relative; overflow: hidden; }
      .panel + .panel { border-left: 2px solid #FF6D38; }
      .comparison.stacked .panel + .panel { border-left: none; border-top: 2px solid #FF6D38; }
      .panel-label {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 4px;
        font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
      }
      .panel-label.rive { color: #C6FE69; }
      .panel-label.svg { color: #B9DDFD; }

      /* Overlay mode */
      .comparison.overlay { position: relative; }
      .comparison.overlay .panel { position: absolute; inset: 0; border: none !important; }
      .comparison.overlay #svg-panel { opacity: 0.5; mix-blend-mode: difference; }
      .comparison.overlay .panel-label.svg { left: auto; right: 12px; }

      /* ── Rive Panel ── */
      #rive-panel { background: #e3e3db; }
      #rive-canvas { width: 100%; height: 100%; }

      /* ── SVG Panel (mirrors main styles.css) ── */
      #svg-panel { background: #e3e3db; }
      .clip-defs { position: absolute; width: 0; height: 0; overflow: hidden; }

      #svg-panel .block-container {
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
      }
      #svg-panel .block-row { position: relative; flex: 1; overflow: hidden; }
      #svg-panel .block-layer { position: absolute; inset: 0; will-change: transform; }

      /* Diamond clip + dark border bg for all sliding layers */
      #svg-panel .row-top .layer-enter,
      #svg-panel .row-mid .layer-enter,
      #svg-panel .row-bot .layer-enter,
      #svg-panel .row-top .layer-wipe,
      #svg-panel .row-mid .layer-wipe,
      #svg-panel .row-bot .layer-wipe,
      #svg-panel .row-top .layer-sweep,
      #svg-panel .row-mid .layer-sweep,
      #svg-panel .row-bot .layer-sweep {
        width: calc(100% + 6vw);
        clip-path: polygon(0% 0%, calc(100% - 6vw) 0%, 100% 50%, calc(100% - 6vw) 100%, 0% 100%);
        background: #0f0f0f;
      }

      /* Inner fill via ::after */
      #svg-panel .block-layer::after {
        content: '';
        position: absolute;
        inset: 3px;
        clip-path: polygon(0% 0%, calc(100% - 6vw) 0%, 100% 50%, calc(100% - 6vw) 100%, 0% 100%);
      }

      #svg-panel .row-top .layer-enter::after { background: #FF6D38; }
      #svg-panel .row-mid .layer-enter::after { background: #7A78FF; }
      #svg-panel .row-bot .layer-enter::after { background: #FFC412; }
      #svg-panel .row-top .layer-wipe::after { background: #C6FE69; }
      #svg-panel .row-mid .layer-wipe::after { background: #B9DDFD; }
      #svg-panel .row-bot .layer-wipe::after { background: #FF6D38; }
      #svg-panel .row-top .layer-sweep::after { background: #7A78FF; }
      #svg-panel .row-mid .layer-sweep::after { background: #C6FE69; }
      #svg-panel .row-bot .layer-sweep::after { background: #B9DDFD; }


      #svg-panel .curve-overlay {
        position: absolute; inset: 0; z-index: 2;
        pointer-events: none; overflow: visible;
      }
      #svg-panel .curve-overlay svg {
        position: absolute; top: 0; left: -20%;
        width: 140%; height: 100%; overflow: hidden;
      }
      #svg-panel .curve-overlay svg path { will-change: stroke-dashoffset; }
    </style>
  </head>
  <body>
    <div class="controls">
      <label>Progress</label>
      <input type="range" id="scrubber" min="0" max="100" value="0" step="0.1" />
      <div class="progress-value" id="progress-display">0%</div>
      <div class="mode-toggle">
        <button class="active" data-mode="side">Side by Side</button>
        <button data-mode="stacked">Stacked</button>
        <button data-mode="overlay">Overlay</button>
      </div>
    </div>

    <div class="comparison" id="comparison">
      <!-- Rive Panel -->
      <div class="panel" id="rive-panel">
        <div class="panel-label rive">Rive (Original)</div>
        <canvas id="rive-canvas"></canvas>
      </div>

      <!-- SVG Panel -->
      <div class="panel" id="svg-panel">
        <div class="panel-label svg">SVG (Rebuilt)</div>

        <div class="block-container">
          <div class="block-row row-top">
            <div class="block-layer layer-enter"></div>
            <div class="block-layer layer-wipe"></div>
            <div class="block-layer layer-sweep"></div>

          </div>
          <div class="block-row row-mid">
            <div class="block-layer layer-enter"></div>
            <div class="block-layer layer-wipe"></div>
            <div class="block-layer layer-sweep"></div>

          </div>
          <div class="block-row row-bot">
            <div class="block-layer layer-enter"></div>
            <div class="block-layer layer-wipe"></div>
            <div class="block-layer layer-sweep"></div>

          </div>
        </div>

        <div class="curve-overlay">
          <svg viewBox="0 0 1400 1050" fill="none" preserveAspectRatio="none">
            <path id="curve-1-border" d="M -300,525 C 400,525 900,700 1500,2150" stroke="#0f0f0f" stroke-width="360" stroke-linecap="butt" />
            <path id="curve-1" d="M -300,525 C 400,525 900,700 1500,2150" stroke="#FFC412" stroke-width="350" stroke-linecap="butt" />
            <path id="curve-2-border" d="M -300,525 C 400,525 900,700 1500,2150" stroke="#0f0f0f" stroke-width="360" stroke-linecap="butt" />
            <path id="curve-2" d="M -300,525 C 400,525 900,700 1500,2150" stroke="#FF6D38" stroke-width="350" stroke-linecap="butt" />
          </svg>
        </div>
      </div>
    </div>

    <script type="module" src="/compare.js"></script>
  </body>
</html>
